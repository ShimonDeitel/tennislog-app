name: Tennislog
options:
  bundleIdPrefix: com.shimondeitel.tennislog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Tennislog:
    type: application
    platform: iOS
    sources:
      - path: Tennislog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tennislog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Tennislog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  TennislogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TennislogTests
      - path: Tennislog.storekit
    dependencies:
      - target: Tennislog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tennislog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  TennislogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: TennislogUITests
    dependencies:
      - target: Tennislog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tennislog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Tennislog:
    build:
      targets:
        Tennislog: all
        TennislogTests: [test]
        TennislogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Tennislog.storekit
    test:
      config: Debug
      storeKitConfiguration: Tennislog.storekit
      targets:
        - TennislogTests
        - TennislogUITests
    archive:
      config: Release
